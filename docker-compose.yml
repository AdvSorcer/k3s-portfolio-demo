name: k3s-portfolio-demo

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./apps/backend
    environment:
      PORT: 3000
      DATABASE_URL: postgres://portfolio:portfolio@postgres:5432/portfolio
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./apps/frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  edge:
    image: nginx:1.27-alpine
    ports:
      - "8081:80"
    volumes:
      - ./infra/local/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
