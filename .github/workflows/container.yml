name: container

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: backend
            context: apps/backend
            image: k3s-portfolio-backend
          - name: frontend
            context: apps/frontend
            image: k3s-portfolio-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set image repository
        id: image
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "repository=ghcr.io/${owner}/${{ matrix.service.image }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ steps.image.outputs.repository }}:${{ github.sha }}
            ${{ steps.image.outputs.repository }}:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
