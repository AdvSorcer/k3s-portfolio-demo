apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "k3s-portfolio.fullname" . }}-config
data:
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  POSTGRES_USER: {{ .Values.postgres.username | quote }}
  POSTGRES_HOST: {{ include "k3s-portfolio.fullname" . }}-postgres
  POSTGRES_PORT: "5432"

