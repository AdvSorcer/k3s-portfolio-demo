{{- if .Values.edge.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "k3s-portfolio.fullname" . }}-edge
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      location /api/ {
        proxy_pass http://{{ include "k3s-portfolio.fullname" . }}-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location / {
        proxy_pass http://{{ include "k3s-portfolio.fullname" . }}-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "k3s-portfolio.fullname" . }}-edge
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: {{ include "k3s-portfolio.fullname" . }}-edge
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: {{ .Values.edge.nodePort }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k3s-portfolio.fullname" . }}-edge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "k3s-portfolio.fullname" . }}-edge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "k3s-portfolio.fullname" . }}-edge
    spec:
      containers:
        - name: edge
          image: {{ .Values.edge.image | quote }}
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
{{ toYaml .Values.edge.resources | indent 12 }}
          volumeMounts:
            - name: edge-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: edge-config
          configMap:
            name: {{ include "k3s-portfolio.fullname" . }}-edge
{{- end }}
