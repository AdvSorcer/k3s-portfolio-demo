apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k3s-portfolio
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AdvSorcer/k3s-portfolio-demo.git
    targetRevision: main
    path: infra/helm/k3s-portfolio
    helm:
      valueFiles:
        - values-production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: portfolio
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
